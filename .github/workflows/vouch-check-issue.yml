on:
  issues:
    types: [ opened, reopened ]

name: "Vouch - Check Issue"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.VOUCH_ID }}
          private-key: ${{ secrets.VOUCH_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          sparse-checkout: .github/issue-unvouched-message

      - uses: mitchellh/vouch/action/check-issue@baeb3bf7c7e6c12d6e33bab3870b7e936580a934 # unreleased main
        with:
          issue-number: ${{ github.event.issue.number }}
          auto-close: true
          auto-lock: true
          template-file: .github/issue-unvouched-message
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}